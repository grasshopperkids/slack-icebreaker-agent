name: Monday Icebreaker

on:
  schedule:
    # 17:00 UTC Monday = 9:00 AM PST / 10:00 AM PDT
    # GitHub Actions cron on Mondays can be delayed 1-3 hours (peak usage day).
    # Scheduling at 9 AM PST gives a 3.5-hour buffer before the 12:30 PM PT meeting.
    - cron: '0 17 * * 1'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-icebreaker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate and send icebreaker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node src/index.js
